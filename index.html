<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CA Final Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100dvh;
    background: #0A0A0F;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    position: relative;
    padding: 20px;
  }

  /* Grid background */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,107,53,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.05) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
  }

  /* Glow */
  body::after {
    content: '';
    position: absolute;
    top: 15%; left: 50%; transform: translateX(-50%);
    width: 80vw; height: 40vh;
    background: radial-gradient(ellipse, rgba(255,107,53,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrapper {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    width: 100%; max-width: 400px;
  }

  /* Header */
  .header { text-align: center; }
  .eyebrow {
    font-size: 10px; letter-spacing: 5px;
    color: #FF6B35; text-transform: uppercase;
    opacity: 0.85; margin-bottom: 10px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 7vw, 36px);
    color: #F5F0E8; letter-spacing: -0.5px;
    line-height: 1.15;
  }
  .divider {
    width: 50px; height: 1.5px; margin: 12px auto 0;
    background: linear-gradient(90deg, transparent, #FF6B35, transparent);
  }

  /* Countdown blocks */
  .blocks {
    display: flex; gap: 10px;
    justify-content: center; flex-wrap: nowrap;
  }
  .block { display: flex; flex-direction: column; align-items: center; }
  .box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 10px;
    padding: 14px 10px;
    min-width: 72px;
    text-align: center;
    transition: box-shadow 0.5s ease;
  }
  .box.live { box-shadow: 0 0 18px rgba(255,107,53,0.18); }
  .num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 10vw, 52px);
    color: #F5F0E8; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .num.orange { color: #FF6B35; }
  .unit {
    font-size: 9px; letter-spacing: 3px;
    color: rgba(245,240,232,0.35);
    margin-top: 6px; text-transform: uppercase;
  }

  /* Progress */
  .progress-wrap { width: 100%; }
  .progress-labels {
    display: flex; justify-content: space-between;
    font-size: 10px; color: rgba(245,240,232,0.3);
    letter-spacing: 1px; margin-bottom: 7px;
  }
  .pct { color: #FF6B35; opacity: 0.75; }
  .bar-bg {
    height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF6B35, #FF9A56);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(255,107,53,0.5);
    transition: width 1s linear;
  }

  /* Papers */
  .papers { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .pill {
    padding: 5px 14px; border-radius: 20px;
    font-size: 11px; letter-spacing: 0.5px;
  }
  .dt  { border: 1px solid rgba(255,107,53,0.35); color: #FF6B35; background: rgba(255,107,53,0.06); }
  .idt { border: 1px solid rgba(78,205,196,0.35); color: #4ECDC4; background: rgba(78,205,196,0.06); }
  .ibs { border: 1px solid rgba(168,230,207,0.35); color: #A8E6CF; background: rgba(168,230,207,0.06); }

  /* Footer */
  .footer {
    position: absolute; bottom: 20px;
    font-size: 10px; color: rgba(245,240,232,0.18);
    letter-spacing: 2px; text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="eyebrow">CA Final · Group 2 · May 2026</div>
    <div class="title">The Clock Is Running</div>
    <div class="divider"></div>
  </div>

  <div class="blocks">
    <div class="block">
      <div class="box" id="box-d"><div class="num" id="days">--</div></div>
      <div class="unit">Days</div>
    </div>
    <div class="block">
      <div class="box" id="box-h"><div class="num" id="hours">--</div></div>
      <div class="unit">Hours</div>
    </div>
    <div class="block">
      <div class="box" id="box-m"><div class="num" id="mins">--</div></div>
      <div class="unit">Min</div>
    </div>
    <div class="block">
      <div class="box" id="box-s"><div class="num orange" id="secs">--</div></div>
      <div class="unit">Sec</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span>1 Apr 2026</span>
      <span class="pct" id="pct">0%</span>
      <span>8 May 2026</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
  </div>

  <div class="papers">
    <div class="pill dt">Direct Tax · 8 May</div>
    <div class="pill idt">Indirect Tax</div>
    <div class="pill ibs">IBS</div>
  </div>
</div>

<div class="footer">Consistency beats intensity · Every day counts</div>

<script>
  const TARGET = new Date("2026-05-08T00:00:00");
  const START  = new Date("2026-04-01T00:00:00");
  const TOTAL  = TARGET - START;

  function pad(n) { return String(n).padStart(2, "0"); }

  let pulse = false;
  function tick() {
    const now  = new Date();
    const diff = TARGET - now;
    if (diff <= 0) {
      document.getElementById("days").textContent = "00";
      document.getElementById("hours").textContent = "00";
      document.getElementById("mins").textContent  = "00";
      document.getElementById("secs").textContent  = "00";
      return;
    }
    document.getElementById("days").textContent  = pad(Math.floor(diff / 86400000));
    document.getElementById("hours").textContent = pad(Math.floor((diff / 3600000) % 24));
    document.getElementById("mins").textContent  = pad(Math.floor((diff / 60000) % 60));
    document.getElementById("secs").textContent  = pad(Math.floor((diff / 1000) % 60));

    const elapsed = Math.max(0, now - START);
    const pct = Math.min(100, (elapsed / TOTAL) * 100);
    document.getElementById("bar").style.width = pct.toFixed(2) + "%";
    document.getElementById("pct").textContent = Math.round(pct) + "% elapsed";

    // Pulse the seconds box
    pulse = !pulse;
    document.getElementById("box-s").className = "box" + (pulse ? " live" : "");
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
